groups:
  - name: pod
    count: 2

layers:
  - name: compute
    placement: pod
    nodes_per_group: 8
    port_layout:
      base_lane_bandwidth_gb: 400
      total_lane_units: 4
      supported_port_modes:
        - port_bandwidth_gb: 400
          lane_units: 1

  - name: leaf
    placement: pod
    nodes_per_group: 4
    port_layout:
      base_lane_bandwidth_gb: 400
      total_lane_units: 12
      supported_port_modes:
        - port_bandwidth_gb: 400
          lane_units: 1
        - port_bandwidth_gb: 800
          lane_units: 2

  - name: spine
    placement: global
    nodes_per_group: 4
    port_layout:
      base_lane_bandwidth_gb: 400
      total_lane_units: 8
      supported_port_modes:
        - port_bandwidth_gb: 400
          lane_units: 1
        - port_bandwidth_gb: 800
          lane_units: 2

links:
  - from: compute
    to: leaf
    policy: same_scope_full_mesh
    cables_per_pair: 1
    cable_bandwidth_gb: 400

  - from: leaf
    to: spine
    policy: to_global_full_mesh
    cables_per_pair: 1
    cable_bandwidth_gb: 400
