groupings:
  - name: pod
    members_per_group: 64
  - name: rack
    members_per_group: 8

gpu_nodes:
  total_nodes: 1024
  fabric_port_pools:
    backend:
      - name: IB
        base_lane_bandwidth_gb: 400
        total_lane_units: 8
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1
    frontend:
      - name: Eth
        base_lane_bandwidth_gb: 400
        total_lane_units: 2
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1
    OOB:
      - name: 1G
        base_lane_bandwidth_gb: 1
        total_lane_units: 3
        supported_port_modes:
          - port_bandwidth_gb: 1
            lane_units: 1

fabrics:
  - name: backend
    gpu_nodes_placement: pod
    layers:
      - name: leaf
        placement: pod
        nodes_per_group: 8
        port_pools:
          - name: IB
            base_lane_bandwidth_gb: 400
            total_lane_units: 128
            supported_port_modes:
              - port_bandwidth_gb: 400
                lane_units: 1
              - port_bandwidth_gb: 800
                lane_units: 2

      - name: spine
        placement: pod
        nodes_per_group: 8
        port_pools:
          - name: IB
            base_lane_bandwidth_gb: 400
            total_lane_units: 128
            supported_port_modes:
              - port_bandwidth_gb: 400
                lane_units: 1
              - port_bandwidth_gb: 800
                lane_units: 2

      - name: core
        placement: global
        nodes_per_group: 64
        port_pools:
          - name: IB
            base_lane_bandwidth_gb: 400
            total_lane_units: 128
            supported_port_modes:
              - port_bandwidth_gb: 400
                lane_units: 1
              - port_bandwidth_gb: 800
                lane_units: 2

    links:
      - from: gpu_nodes
        to: leaf
        policy: same_scope_full_mesh
        port_pool: IB
        cables_per_pair: 1
        cable_bandwidth_gb: 400

      - from: leaf
        to: spine
        policy: same_scope_full_mesh
        port_pool: IB
        cables_per_pair: 8
        cable_bandwidth_gb: 400

      - from: spine
        to: core
        policy: to_global_full_mesh
        port_pool: IB
        cables_per_pair: 1
        cable_bandwidth_gb: 400

  - name: frontend
    gpu_nodes_placement: pod
    layers:
      - name: leaf
        placement: pod
        nodes_per_group: 2
        port_pools:
          - name: Eth
            base_lane_bandwidth_gb: 400
            total_lane_units: 128
            supported_port_modes:
              - port_bandwidth_gb: 400
                lane_units: 1
              - port_bandwidth_gb: 800
                lane_units: 2

      - name: spine
        placement: global
        nodes_per_group: 16
        port_pools:
          - name: Eth
            base_lane_bandwidth_gb: 400
            total_lane_units: 128
            supported_port_modes:
              - port_bandwidth_gb: 400
                lane_units: 1
              - port_bandwidth_gb: 800
                lane_units: 2

    links:
      - from: gpu_nodes
        to: leaf
        policy: same_scope_full_mesh
        port_pool: Eth
        cables_per_pair: 1
        cable_bandwidth_gb: 400

      - from: leaf
        to: spine
        policy: to_global_full_mesh
        port_pool: Eth
        cables_per_pair: 4
        cable_bandwidth_gb: 400

  - name: OOB
    gpu_nodes_placement: rack
    layers:
      - name: leaf
        placement: rack
        nodes_per_group: 1
        port_pools:
          - name: 1G
            base_lane_bandwidth_gb: 1
            total_lane_units: 48
            supported_port_modes:
              - port_bandwidth_gb: 1
                lane_units: 1
          - name: 100G
            base_lane_bandwidth_gb: 100
            total_lane_units: 4
            supported_port_modes:
              - port_bandwidth_gb: 100
                lane_units: 1

      - name: spine
        placement: pod
        nodes_per_group: 2
        port_pools:
          - name: 1G
            base_lane_bandwidth_gb: 1
            total_lane_units: 48
            supported_port_modes:
              - port_bandwidth_gb: 1
                lane_units: 1
          - name: 100G
            base_lane_bandwidth_gb: 100
            total_lane_units: 4
            supported_port_modes:
              - port_bandwidth_gb: 100
                lane_units: 1

      - name: core
        placement: global
        nodes_per_group: 2
        port_pools:
          - name: 100G
            base_lane_bandwidth_gb: 100
            total_lane_units: 32
            supported_port_modes:
              - port_bandwidth_gb: 100
                lane_units: 1

    links:
      - from: gpu_nodes
        to: leaf
        policy: same_scope_full_mesh
        port_pool: 1G
        cables_per_pair: 3
        cable_bandwidth_gb: 1

      - from: leaf
        to: spine
        policy: to_ancestor_full_mesh
        port_pool: 1G
        cables_per_pair: 1
        cable_bandwidth_gb: 1

      - from: spine
        to: core
        policy: to_global_full_mesh
        port_pool: 100G
        cables_per_pair: 1
        cable_bandwidth_gb: 100
