groups:
  - name: pod
    count: 16

layers:
  - name: compute
    placement: pod
    nodes_per_group: 64
    port_pools:
      - name: fabric
        base_lane_bandwidth_gb: 400
        total_lane_units: 8
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1

  - name: leaf
    placement: pod
    nodes_per_group: 8
    port_pools:
      - name: fabric
        base_lane_bandwidth_gb: 400
        total_lane_units: 128
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1
          - port_bandwidth_gb: 800
            lane_units: 2

  - name: spine
    placement: pod
    nodes_per_group: 8
    port_pools:
      - name: fabric
        base_lane_bandwidth_gb: 400
        total_lane_units: 128
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1
          - port_bandwidth_gb: 800
            lane_units: 2

  - name: core
    placement: global
    nodes_per_group: 64
    port_pools:
      - name: fabric
        base_lane_bandwidth_gb: 400
        total_lane_units: 128
        supported_port_modes:
          - port_bandwidth_gb: 400
            lane_units: 1
          - port_bandwidth_gb: 800
            lane_units: 2

links:
  - from: compute
    to: leaf
    policy: same_scope_full_mesh
    port_pool: fabric
    cables_per_pair: 1
    cable_bandwidth_gb: 400

  - from: leaf
    to: spine
    policy: same_scope_full_mesh
    port_pool: fabric
    cables_per_pair: 8
    cable_bandwidth_gb: 400

  - from: spine
    to: core
    policy: to_global_full_mesh
    port_pool: fabric
    cables_per_pair: 1
    cable_bandwidth_gb: 400
